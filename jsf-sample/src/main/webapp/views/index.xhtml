<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:dads="jakarta.faces.composite/dads"
      lang="ja">
<h:head>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>トップ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&amp;display=swap" rel="stylesheet" />
    <h:outputStylesheet library="css" name="dads.css" />
</h:head>
<h:body>
<dads:pageContainer>

    <h1 class="dads-heading" data-size="28" data-rule="4">JSF サンプル</h1>

    <h:form styleClass="form-actions">
        <dads:button value="ユーザー登録フォームへ"
                     outcome="register"
                     buttonType="solid-fill"
                     size="lg" />
    </h:form>

    <p><dads:link value="登録済みユーザー一覧" outcome="list" /></p>

</dads:pageContainer>
</h:body>
</html>
