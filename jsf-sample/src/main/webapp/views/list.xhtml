<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:dads="jakarta.faces.composite/dads"
      lang="ja">
<h:head>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>登録済みユーザー一覧</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&amp;display=swap" rel="stylesheet" />
</h:head>
<h:body>
<dads:pageContainer wide="true" title="登録済みユーザー一覧">

    <h:panelGroup rendered="#{empty userListBacking.tableRows}">
        <p>登録済みユーザーはいません。</p>
    </h:panelGroup>

    <h:panelGroup rendered="#{not empty userListBacking.tableRows}">
        <dads:table headers="#{userListBacking.tableHeaders}"
                    rows="#{userListBacking.tableRows}" />
    </h:panelGroup>

    <h:form styleClass="form-actions">
        <dads:button value="登録フォームへ"
                     outcome="register"
                     buttonType="outline"
                     size="md" />
    </h:form>

</dads:pageContainer>
</h:body>
</html>
